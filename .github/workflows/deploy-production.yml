name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        type: string
      release_notes:
        description: 'Brief release notes'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  validate-confirmation:
    name: Validate Deploy Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation string
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-to-production" ]; then
            echo "ERROR: Confirmation string does not match. Aborting."
            exit 1
          fi
          echo "Confirmation validated. Proceeding with production deploy."

  pre-deploy-checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    needs: [validate-confirmation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kupuri/content-model exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Run tests
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.PRODUCTION_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.PRODUCTION_APP_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          NEO4J_URI: ${{ secrets.PRODUCTION_NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.PRODUCTION_NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.PRODUCTION_NEO4J_PASSWORD }}

      - name: Check localization coverage
        run: node scripts/check-l10n-coverage.mjs

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment:
      name: production
      url: https://kupuri.mx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kupuri/content-model exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Run database migrations
        run: pnpm --filter @kupuri/content-model exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to Vercel (production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          working-directory: ./apps/web
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          NEO4J_URI: ${{ secrets.PRODUCTION_NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.PRODUCTION_NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.PRODUCTION_NEO4J_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.PRODUCTION_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.PRODUCTION_APP_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.PRODUCTION_STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.PRODUCTION_STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_STRIPE_PUBLISHABLE_KEY }}

      - name: Verify health check
        run: |
          echo "Waiting 30s for deployment to warm up..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kupuri.mx/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed (200 OK)"

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${new Date().toISOString().split('T')[0].replace(/-/g, '.')}-${context.sha.substring(0, 7)}`;
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Production Deploy — ${new Date().toISOString().split('T')[0]}`,
              body: `## Release Notes\n\n${{ github.event.inputs.release_notes }}\n\n**Deployment URL:** ${{ steps.deploy.outputs.preview-url }}\n**Deployed by:** @${{ github.actor }}`,
              draft: false,
              prerelease: false
            });
