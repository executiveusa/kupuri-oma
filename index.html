<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kupuri 3D Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top Menu Bar -->
  <header id="menu-bar">
    <div id="app-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Kupuri Studio</span>
    </div>
    <nav id="top-nav">
      <div class="menu-item" id="menu-file">
        File
        <div class="dropdown">
          <button onclick="newScene()">New Scene</button>
          <button onclick="exportGLTF()">Export GLTF…</button>
          <button onclick="exportOBJ()">Export OBJ…</button>
        </div>
      </div>
      <div class="menu-item" id="menu-add">
        Add
        <div class="dropdown">
          <button onclick="addObject('box')">Cube</button>
          <button onclick="addObject('sphere')">Sphere</button>
          <button onclick="addObject('cylinder')">Cylinder</button>
          <button onclick="addObject('cone')">Cone</button>
          <button onclick="addObject('torus')">Torus</button>
          <button onclick="addObject('plane')">Plane</button>
          <hr/>
          <button onclick="addLight('point')">Point Light</button>
          <button onclick="addLight('directional')">Directional Light</button>
          <button onclick="addLight('spot')">Spot Light</button>
        </div>
      </div>
      <div class="menu-item" id="menu-view">
        View
        <div class="dropdown">
          <button onclick="setCameraView('perspective')">Perspective</button>
          <button onclick="setCameraView('front')">Front</button>
          <button onclick="setCameraView('top')">Top</button>
          <button onclick="setCameraView('right')">Right</button>
          <hr/>
          <button onclick="toggleGrid()">Toggle Grid</button>
          <button onclick="toggleAxes()">Toggle Axes</button>
          <button onclick="toggleWireframe()">Toggle Wireframe</button>
        </div>
      </div>
    </nav>
    <div id="header-right">
      <span id="render-mode-label">Mode:</span>
      <select id="render-mode" onchange="setRenderMode(this.value)">
        <option value="solid">Solid</option>
        <option value="wireframe">Wireframe</option>
      </select>
    </div>
  </header>

  <div id="workspace">
    <!-- Left Panel: Toolbar -->
    <aside id="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" id="tool-select" title="Select (Q)" onclick="setTool('select')">
          <svg viewBox="0 0 24 24"><path d="M4 4l7 18 3-7 7-3z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" id="tool-move" title="Move (G)" onclick="setTool('translate')">
          <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M8 8l4-4 4 4M8 16l4 4 4-4M8 12H4l4-4M16 12h4l-4-4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" id="tool-rotate" title="Rotate (R)" onclick="setTool('rotate')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 4a8 8 0 0 1 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 8l0 4-4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" id="tool-scale" title="Scale (S)" onclick="setTool('scale')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/><line x1="10" y1="14" x2="14" y2="10" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <button class="tool-btn" title="Add Cube" onclick="addObject('box')">
          <svg viewBox="0 0 24 24"><path d="M12 2l9 5v10l-9 5-9-5V7z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><path d="M12 2v20M3 7l9 5 9-5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" title="Add Sphere" onclick="addObject('sphere')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><ellipse cx="12" cy="12" rx="4" ry="9" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="tool-btn" title="Add Plane" onclick="addObject('plane')">
          <svg viewBox="0 0 24 24"><path d="M3 17l9-10 9 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><line x1="3" y1="17" x2="21" y2="17" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" title="Add Point Light" onclick="addLight('point')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 2v2M12 20v2M2 12H4M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <button class="tool-btn" title="Delete Selected (Del)" onclick="deleteSelected()">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" title="Focus Selected (F)" onclick="focusSelected()">
          <svg viewBox="0 0 24 24"><path d="M3 3h6M3 3v6M21 3h-6M21 3v6M3 21h6M3 21v-6M21 21h-6M21 21v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </aside>

    <!-- Left Panel: Scene Hierarchy -->
    <aside id="scene-panel">
      <div class="panel-header">Scene</div>
      <div id="scene-tree"></div>
    </aside>

    <!-- Main 3D Viewport -->
    <main id="viewport-container">
      <canvas id="viewport"></canvas>
      <div id="viewport-overlay">
        <div id="viewport-info">
          <span id="object-count">Objects: 0</span>
          <span id="poly-count">Polygons: 0</span>
        </div>
        <div id="view-label">Perspective</div>
        <div id="transform-hint"></div>
      </div>
    </main>

    <!-- Right Panel: Properties Inspector -->
    <aside id="properties-panel">
      <div class="panel-header">Properties</div>
      <div id="properties-content">
        <div id="no-selection">
          <svg viewBox="0 0 24 24" width="32" height="32"><path d="M4 4l7 18 3-7 7-3z" stroke="#555" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
          <p>No object selected</p>
        </div>
        <div id="object-properties" style="display:none;">
          <div class="prop-section">
            <div class="prop-section-title">Transform</div>
            <div class="prop-row">
              <label>Name</label>
              <input type="text" id="prop-name" onchange="updateObjectName(this.value)" />
            </div>
            <div class="prop-row">
              <label>Position</label>
              <div class="vec3-input">
                <span>X</span><input type="number" id="pos-x" step="0.1" onchange="updateTransform()" />
                <span>Y</span><input type="number" id="pos-y" step="0.1" onchange="updateTransform()" />
                <span>Z</span><input type="number" id="pos-z" step="0.1" onchange="updateTransform()" />
              </div>
            </div>
            <div class="prop-row">
              <label>Rotation</label>
              <div class="vec3-input">
                <span>X</span><input type="number" id="rot-x" step="1" onchange="updateTransform()" />
                <span>Y</span><input type="number" id="rot-y" step="1" onchange="updateTransform()" />
                <span>Z</span><input type="number" id="rot-z" step="1" onchange="updateTransform()" />
              </div>
            </div>
            <div class="prop-row">
              <label>Scale</label>
              <div class="vec3-input">
                <span>X</span><input type="number" id="scl-x" step="0.1" onchange="updateTransform()" />
                <span>Y</span><input type="number" id="scl-y" step="0.1" onchange="updateTransform()" />
                <span>Z</span><input type="number" id="scl-z" step="0.1" onchange="updateTransform()" />
              </div>
            </div>
          </div>
          <div class="prop-section" id="material-section">
            <div class="prop-section-title">Material</div>
            <div class="prop-row">
              <label>Color</label>
              <input type="color" id="prop-color" onchange="updateMaterialColor(this.value)" />
            </div>
            <div class="prop-row">
              <label>Metalness</label>
              <input type="range" id="prop-metalness" min="0" max="1" step="0.01" oninput="updateMaterial()" />
            </div>
            <div class="prop-row">
              <label>Roughness</label>
              <input type="range" id="prop-roughness" min="0" max="1" step="0.01" oninput="updateMaterial()" />
            </div>
            <div class="prop-row">
              <label>Wireframe</label>
              <input type="checkbox" id="prop-wireframe" onchange="updateMaterial()" />
            </div>
          </div>
          <div class="prop-section" id="light-section" style="display:none;">
            <div class="prop-section-title">Light</div>
            <div class="prop-row">
              <label>Color</label>
              <input type="color" id="light-color" onchange="updateLightColor(this.value)" />
            </div>
            <div class="prop-row">
              <label>Intensity</label>
              <input type="range" id="light-intensity" min="0" max="10" step="0.1" oninput="updateLightIntensity()" />
              <span id="light-intensity-val">1.0</span>
            </div>
          </div>
          <div class="prop-section">
            <button class="danger-btn" onclick="deleteSelected()">Delete Object</button>
            <button class="secondary-btn" onclick="duplicateSelected()">Duplicate</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Status Bar -->
  <footer id="status-bar">
    <span id="status-text">Ready · Click viewport and use mouse to orbit (drag), scroll to zoom, middle-click to pan</span>
    <span id="fps-counter">-- fps</span>
  </footer>

  <!-- Three.js and addons via CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
